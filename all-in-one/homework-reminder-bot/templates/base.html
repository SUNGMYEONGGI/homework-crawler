<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}과제 리마인더 봇{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            padding-top: 50px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .progress {
            height: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }
        .progress-bar {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        .status-message {
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            font-weight: 500;
        }
        .status-success {
            background: linear-gradient(45deg, #56ab2f, #a8e6cf);
            color: white;
        }
        .status-error {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }
        .status-info {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
        }
        .student-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .student-item {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .student-submitted {
            background: linear-gradient(45deg, #56ab2f, #a8e6cf);
            color: white;
        }
        .student-not-submitted {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }
        .realtime-student-item {
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }
        .realtime-student-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .current-student-display {
            font-weight: bold;
            color: #0066cc;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .progress-stats {
            font-size: 0.9rem;
            background: rgba(0,102,204,0.1);
            padding: 8px 12px;
            border-radius: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="text-center mb-4">
                    <h1 class="text-white mb-3">
                        <i class="fas fa-robot me-3"></i>과제 리마인더 봇
                    </h1>
                    <p class="text-white-50">FastCampus LMS 과제 제출 현황을 확인하고 리마인더를 보내는 봇입니다.</p>
                </div>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
