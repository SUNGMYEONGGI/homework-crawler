<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 리마인더 봇 - FastAPI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .header-section {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 2rem;
            text-align: center;
        }
        
        .progress-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        
        .log-section {
            background: #1e1e1e;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .results-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stats-card {
            background: linear-gradient(45deg, #2196F3, #21CBF3);
            color: white;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
        }
        
        .btn-custom {
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        
        .student-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="main-container">
                    <!-- 헤더 -->
                    <div class="header-section">
                        <h1 class="mb-3">
                            <i class="fas fa-robot me-3"></i>
                            과제 리마인더 봇
                        </h1>
                        <p class="lead mb-0">FastCampus LMS 과제 미제출 학생 확인 및 슬랙 리마인더 전송</p>
                    </div>
                    
                    <!-- 시험 ID 입력 -->
                    <div class="p-4">
                        <div class="row">
                            <div class="col-md-8 mx-auto">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body p-4">
                                        <form id="examForm">
                                            <div class="mb-4">
                                                <h5 class="fw-bold mb-3">
                                                    <i class="fas fa-clipboard-list me-2"></i>기수별 시험 ID 입력
                                                </h5>
                                                <div class="form-text mb-3">각 기수별로 확인하고자 하는 시험 ID를 입력하세요. 비어있는 기수는 크롤링에서 제외됩니다.</div>
                                                
                                                <div class="row">
                                                    <div class="col-md-6 mb-3">
                                                        <label for="cohort13" class="form-label fw-bold text-primary">
                                                            <i class="fas fa-users me-2"></i>13기 시험 ID
                                                        </label>
                                                        <input type="text" 
                                                               class="form-control" 
                                                               id="cohort13" 
                                                               name="cohort_13" 
                                                               placeholder="예: 12345">
                                                    </div>
                                                    
                                                    <div class="col-md-6 mb-3">
                                                        <label for="cohort14" class="form-label fw-bold text-success">
                                                            <i class="fas fa-users me-2"></i>14기 시험 ID
                                                        </label>
                                                        <input type="text" 
                                                               class="form-control" 
                                                               id="cohort14" 
                                                               name="cohort_14" 
                                                               placeholder="예: 12346">
                                                    </div>
                                                    
                                                    <div class="col-md-6 mb-3">
                                                        <label for="cohort15" class="form-label fw-bold text-warning">
                                                            <i class="fas fa-users me-2"></i>15기 시험 ID
                                                        </label>
                                                        <input type="text" 
                                                               class="form-control" 
                                                               id="cohort15" 
                                                               name="cohort_15" 
                                                               placeholder="예: 12347">
                                                    </div>
                                                    
                                                    <div class="col-md-6 mb-3">
                                                        <label for="cohort16" class="form-label fw-bold text-danger">
                                                            <i class="fas fa-users me-2"></i>16기 시험 ID
                                                        </label>
                                                        <input type="text" 
                                                               class="form-control" 
                                                               id="cohort16" 
                                                               name="cohort_16" 
                                                               placeholder="예: 12348">
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div class="text-center">
                                                <button type="submit" 
                                                        class="btn btn-primary btn-lg btn-custom"
                                                        id="submitBtn">
                                                    <i class="fas fa-search me-2"></i>기수별 과제 확인 시작
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 상태 메시지 -->
                        <div id="statusMessage" class="mt-3"></div>
                        
                        <!-- 진행률 표시 -->
                        <div class="progress-section" id="progressSection" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold">진행 상황</span>
                                <span id="progressPercent">0%</span>
                            </div>
                            <div class="progress mb-2" style="height: 10px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     id="progressBar" 
                                     role="progressbar" 
                                     style="width: 0%"
                                     aria-valuenow="0" 
                                     aria-valuemin="0" 
                                     aria-valuemax="100"></div>
                            </div>
                            <div id="progressText" class="text-muted small">대기 중...</div>
                        </div>
                        
                        <!-- 실시간 로그 -->
                        <div class="mt-3" id="logContainer" style="display: none;">
                            <div class="card">
                                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0">
                                        <i class="fas fa-terminal me-2"></i>실시간 로그
                                    </h6>
                                    <button class="btn btn-sm btn-outline-light" onclick="toggleLogs()">
                                        <i class="fas fa-expand-alt" id="logToggleIcon"></i>
                                    </button>
                                </div>
                                <div class="card-body p-0">
                                    <div class="log-section p-3" id="logSection">
                                        <div id="realTimeLogs">
                                            <p class="text-light small mb-1">
                                                <i class="fas fa-circle text-success me-2" style="font-size: 0.5rem;"></i>
                                                WebSocket 연결 대기 중...
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 결과 표시 -->
                        <div class="mt-4" id="resultsSection" style="display: none;">
                            <div class="results-card card fade-in">
                                <div class="card-header bg-success text-white">
                                    <h5 class="mb-0">
                                        <i class="fas fa-chart-bar me-2"></i>확인 결과
                                    </h5>
                                </div>
                                <div class="card-body">
                                    <!-- 통계 -->
                                    <div class="row text-center mb-4">
                                        <div class="col-md-4">
                                            <div class="stats-card">
                                                <div class="h3 mb-1" id="totalCount">0</div>
                                                <div class="small">전체 학생</div>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="stats-card" style="background: linear-gradient(45deg, #4CAF50, #45a049);">
                                                <div class="h3 mb-1" id="submittedCount">0</div>
                                                <div class="small">제출 완료</div>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="stats-card" style="background: linear-gradient(45deg, #f44336, #d32f2f);">
                                                <div class="h3 mb-1" id="nonSubmittedCount">0</div>
                                                <div class="small">미제출</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 기수별 학생 목록 -->
                                    <div class="row">
                                        <div class="col-md-6">
                                            <h6 class="text-success">
                                                <i class="fas fa-check-circle me-2"></i>제출한 학생 (전체)
                                            </h6>
                                            <ul class="list-group student-list" id="submittedList">
                                                <!-- 동적으로 추가됨 -->
                                            </ul>
                                        </div>
                                        <div class="col-md-6">
                                            <h6 class="text-danger">
                                                <i class="fas fa-exclamation-triangle me-2"></i>기수별 미제출 학생
                                            </h6>
                                            <div id="nonSubmittedByCohort">
                                                <!-- 기수별 미제출 학생 목록이 동적으로 추가됨 -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 슬랙 전송 -->
                        <div class="mt-4" id="slackSection" style="display: none;">
                            <div class="card border-warning">
                                <div class="card-header bg-warning text-dark">
                                    <h5 class="mb-0">
                                        <i class="fab fa-slack me-2"></i>슬랙 리마인더 전송
                                    </h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="slackChannel" class="form-label">채널 (선택사항)</label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="slackChannel" 
                                               placeholder="#homework-reminders">
                                        <div class="form-text">비워두면 기본 채널(#homework-reminders)에 전송됩니다.</div>
                                    </div>
                                    <button type="button" 
                                            class="btn btn-warning btn-custom"
                                            id="sendSlackBtn"
                                            onclick="sendSlackReminder()">
                                        <i class="fab fa-slack me-2"></i>슬랙으로 리마인더 전송
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // WebSocket 연결
        let ws = null;
        let isConnected = false;
        
        // 페이지 로드 시 WebSocket 연결
        document.addEventListener('DOMContentLoaded', function() {
            connectWebSocket();
            
            // 폼 제출 이벤트
            document.getElementById('examForm').addEventListener('submit', function(e) {
                e.preventDefault();
                startHomeworkCheck();
            });
        });
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function(event) {
                console.log('WebSocket 연결됨');
                isConnected = true;
                addLogMessage('🔗 실시간 연결이 설정되었습니다.', 'success');
            };
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = function(event) {
                console.log('WebSocket 연결 끊어짐');
                isConnected = false;
                addLogMessage('🔌 연결이 끊어졌습니다. 재연결 시도 중...', 'warning');
                // 재연결 시도
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket 오류:', error);
                addLogMessage('❌ 연결 오류가 발생했습니다.', 'error');
            };
        }
        
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'log':
                    addLogMessage(data.message);
                    break;
                case 'progress':
                    updateProgress(data.progress * 100, data.description);
                    break;
                case 'complete':
                    handleComplete(data);
                    break;
                case 'error':
                    handleError(data.message);
                    break;
                case 'info':
                    addLogMessage(data.message, 'info');
                    break;
            }
        }
        
        function startHomeworkCheck() {
            // 기수별 시험 ID 수집
            const cohort13 = document.getElementById('cohort13').value.trim();
            const cohort14 = document.getElementById('cohort14').value.trim();
            const cohort15 = document.getElementById('cohort15').value.trim();
            const cohort16 = document.getElementById('cohort16').value.trim();
            
            // 최소 하나의 시험 ID가 있는지 확인
            if (!cohort13 && !cohort14 && !cohort15 && !cohort16) {
                showAlert('최소 하나의 기수에 대한 시험 ID를 입력해주세요.', 'warning');
                return;
            }
            
            // UI 상태 변경
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>확인 중...';
            
            // 섹션들 표시
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('logContainer').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('slackSection').style.display = 'none';
            
            // 상태 초기화
            updateProgress(0, '작업 시작...');
            clearLogs();
            
            // API 호출 데이터 준비
            const requestData = {
                cohort_13: cohort13,
                cohort_14: cohort14,
                cohort_15: cohort15,
                cohort_16: cohort16
            };
            
            // API 호출
            fetch('/api/check_homework', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    showAlert(data.message, 'success');
                    addLogMessage(`🚀 ${data.message}`);
                    
                    // 입력된 기수 정보 표시
                    const validCohorts = Object.entries(data.cohort_exam_ids)
                        .filter(([cohort, examId]) => examId)
                        .map(([cohort, examId]) => `${cohort}기(${examId})`)
                        .join(', ');
                    addLogMessage(`📋 확인 대상: ${validCohorts}`);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('요청 처리 중 오류가 발생했습니다.', 'danger');
                handleError('요청 처리 중 오류가 발생했습니다.');
            });
        }
        
        function updateProgress(progress, message) {
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const progressText = document.getElementById('progressText');
            
            progressBar.style.width = progress + '%';
            progressBar.setAttribute('aria-valuenow', progress);
            progressPercent.textContent = Math.round(progress) + '%';
            progressText.textContent = message;
        }
        
        function addLogMessage(message, type = 'log') {
            const logContainer = document.getElementById('realTimeLogs');
            const iconClass = getLogIcon(message, type);
            
            const logHtml = `
                <p class="text-light small mb-1" style="word-break: break-all;">
                    <i class="fas ${iconClass.icon} ${iconClass.color} me-2" style="font-size: 0.5rem;"></i>${message}
                </p>
            `;
            
            logContainer.innerHTML += logHtml;
            
            // 자동 스크롤
            const logSection = document.getElementById('logSection');
            logSection.scrollTop = logSection.scrollHeight;
        }
        
        function getLogIcon(message, type) {
            if (type === 'error') return { icon: 'fa-exclamation-triangle', color: 'text-danger' };
            if (type === 'warning') return { icon: 'fa-exclamation-circle', color: 'text-warning' };
            if (type === 'success') return { icon: 'fa-check-circle', color: 'text-success' };
            if (type === 'info') return { icon: 'fa-info-circle', color: 'text-info' };
            
            if (message.includes('✅')) return { icon: 'fa-check-circle', color: 'text-success' };
            if (message.includes('❌')) return { icon: 'fa-times-circle', color: 'text-danger' };
            if (message.includes('⏳')) return { icon: 'fa-clock', color: 'text-warning' };
            if (message.includes('🚀')) return { icon: 'fa-rocket', color: 'text-primary' };
            if (message.includes('🔐')) return { icon: 'fa-lock', color: 'text-warning' };
            if (message.includes('📋')) return { icon: 'fa-clipboard-list', color: 'text-info' };
            if (message.includes('🎯')) return { icon: 'fa-bullseye', color: 'text-primary' };
            if (message.includes('📝')) return { icon: 'fa-edit', color: 'text-success' };
            
            return { icon: 'fa-circle', color: 'text-success' };
        }
        
        function clearLogs() {
            document.getElementById('realTimeLogs').innerHTML = '';
        }
        
        function handleComplete(data) {
            updateProgress(100, data.message);
            
            // 결과 표시
            if (data.results) {
                displayResults(data.results);
            }
            
            // 버튼 상태 복원
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-search me-2"></i>시험 ID 확인';
            
            addLogMessage('🎉 과제 확인이 완료되었습니다!', 'success');
        }
        
        function handleError(message) {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-search me-2"></i>시험 ID 확인';
            
            showAlert(`❌ ${message}`, 'danger');
            addLogMessage(`❌ 오류: ${message}`, 'error');
        }
        
        function displayResults(results) {
            // 결과 섹션 표시
            document.getElementById('resultsSection').style.display = 'block';
            
            // 통계 업데이트
            document.getElementById('submittedCount').textContent = results.submitted_count;
            document.getElementById('nonSubmittedCount').textContent = results.non_submitted_count;
            document.getElementById('totalCount').textContent = results.total_students;
            
            // 제출한 학생 목록 (전체)
            const submittedList = document.getElementById('submittedList');
            submittedList.innerHTML = '';
            results.submitted.forEach(student => {
                submittedList.innerHTML += `<li class="list-group-item text-success">✅ ${student}</li>`;
            });
            
            // 기수별 미제출 학생 목록 표시
            const nonSubmittedByCohort = document.getElementById('nonSubmittedByCohort');
            nonSubmittedByCohort.innerHTML = '';
            
            const cohortColors = {
                '13': 'primary',
                '14': 'success', 
                '15': 'warning',
                '16': 'danger'
            };
            
            Object.entries(results.non_submitted_by_cohort).forEach(([cohort, students]) => {
                if (students && students.length > 0) {
                    const color = cohortColors[cohort] || 'secondary';
                    const examId = results.cohort_exam_ids[cohort] || '';
                    
                    const cohortSection = document.createElement('div');
                    cohortSection.className = 'mb-3';
                    cohortSection.innerHTML = `
                        <div class="card border-${color}">
                            <div class="card-header bg-${color} text-white py-2">
                                <h6 class="mb-0">
                                    <i class="fas fa-users me-2"></i>${cohort}기 미제출 (시험 ID: ${examId})
                                    <span class="badge bg-light text-${color} ms-2">${students.length}명</span>
                                </h6>
                            </div>
                            <div class="card-body p-2">
                                <ul class="list-group list-group-flush">
                                    ${students.map(student => 
                                        `<li class="list-group-item py-1 px-2 text-${color}">❌ ${student}</li>`
                                    ).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                    nonSubmittedByCohort.appendChild(cohortSection);
                }
            });
            
            // 슬랙 전송 버튼 활성화
            if (results.non_submitted_count > 0) {
                document.getElementById('slackSection').style.display = 'block';
                const sendSlackBtn = document.getElementById('sendSlackBtn');
                sendSlackBtn.setAttribute('data-cohort-exam-ids', JSON.stringify(results.cohort_exam_ids));
                sendSlackBtn.setAttribute('data-non-submitted-by-cohort', JSON.stringify(results.non_submitted_by_cohort));
            }
        }
        
        function sendSlackReminder() {
            const sendSlackBtn = document.getElementById('sendSlackBtn');
            const cohortExamIds = JSON.parse(sendSlackBtn.getAttribute('data-cohort-exam-ids'));
            const nonSubmittedByCohort = JSON.parse(sendSlackBtn.getAttribute('data-non-submitted-by-cohort'));
            const channel = document.getElementById('slackChannel').value.trim() || null;
            
            // 버튼 상태 변경
            sendSlackBtn.disabled = true;
            sendSlackBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>전송 중...';
            
            fetch('/api/send_slack_reminder', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    cohort_exam_ids: cohortExamIds,
                    non_submitted_by_cohort: nonSubmittedByCohort,
                    channel: channel
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert(data.message, 'success');
                } else {
                    showAlert(data.message, 'danger');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('슬랙 전송 중 오류가 발생했습니다.', 'danger');
            })
            .finally(() => {
                // 버튼 상태 복원
                sendSlackBtn.disabled = false;
                sendSlackBtn.innerHTML = '<i class="fab fa-slack me-2"></i>슬랙으로 리마인더 전송';
            });
        }
        
        function showAlert(message, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        }
        
        function toggleLogs() {
            const logSection = document.getElementById('logSection');
            const toggleIcon = document.getElementById('logToggleIcon');
            
            if (logSection.style.maxHeight === '400px') {
                logSection.style.maxHeight = '200px';
                toggleIcon.className = 'fas fa-expand-alt';
            } else {
                logSection.style.maxHeight = '400px';
                toggleIcon.className = 'fas fa-compress-alt';
            }
        }
    </script>
</body>
</html>
