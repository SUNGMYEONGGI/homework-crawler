<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastCampus LMS 크롤러 v2.0</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>FastCampus LMS Crawler</span>
                    <span class="version">v2.0</span>
                </div>
                <div class="status-indicator" id="status-indicator">
                    <div class="status-dot"></div>
                    <span>대기중</span>
                </div>
            </div>
        </header>

        <!-- 메인 컨테이너 -->
        <main class="main-content">
            <!-- 입력 폼 -->
            <div class="form-container glass">
                <h2><i class="fas fa-cog"></i> 크롤링 설정</h2>
                
                <div class="form-group">
                    <label for="exam-id">시험 ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="exam-id" placeholder="예: 8532" required>
                        <i class="fas fa-hashtag input-icon"></i>
                    </div>
                    <small>시험 상세 페이지 URL의 숫자 부분을 입력하세요</small>
                </div>

                <div class="form-group">
                    <label for="file-format">파일 형식</label>
                    <div class="select-wrapper">
                        <select id="file-format">
                            <option value="csv">CSV</option>
                            <option value="xlsx">Excel (XLSX)</option>
                            <option value="json">JSON</option>
                            <option value="xml">XML</option>
                        </select>
                        <i class="fas fa-chevron-down select-icon"></i>
                    </div>
                </div>

                <div class="button-group">
                    <button id="start-btn" class="btn btn-primary">
                        <i class="fas fa-play"></i>
                        <span>크롤링 시작</span>
                    </button>
                    <button id="stop-btn" class="btn btn-danger" disabled>
                        <i class="fas fa-stop"></i>
                        <span>중지</span>
                    </button>
                </div>
            </div>

            <!-- 진행상황 및 로그 -->
            <div class="info-container">
                <!-- 진행상황 -->
                <div class="progress-container glass">
                    <h3><i class="fas fa-chart-line"></i> 진행상황</h3>
                    <div class="progress-wrapper">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <div class="progress-text" id="progress-text">0%</div>
                    </div>
                    <div class="progress-desc" id="progress-desc">대기중...</div>
                    
                    <!-- 통계 -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="collected-count">0</div>
                            <div class="stat-label">수집된 데이터</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="exam-id-display">-</div>
                            <div class="stat-label">시험 ID</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="file-format-display">-</div>
                            <div class="stat-label">파일 형식</div>
                        </div>
                    </div>
                </div>

                <!-- 실시간 로그 -->
                <div class="log-container glass">
                    <h3><i class="fas fa-terminal"></i> 실시간 로그</h3>
                    <div class="log-content" id="log-content">
                        <div class="log-entry info">
                            <span class="log-time">[시스템]</span>
                            <span class="log-message">시스템이 준비되었습니다. 시험 ID를 입력하고 크롤링을 시작하세요.</span>
                        </div>
                    </div>
                    <div class="log-controls">
                        <button id="clear-log-btn" class="btn btn-secondary">
                            <i class="fas fa-trash"></i> 로그 지우기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 결과 다운로드 -->
            <div class="result-container glass" id="result-container" style="display: none;">
                <h3><i class="fas fa-download"></i> 결과 다운로드</h3>
                <div class="download-info">
                    <p id="download-message">파일이 준비되었습니다!</p>
                    <button id="download-btn" class="btn btn-success">
                        <i class="fas fa-file-download"></i>
                        <span>파일 다운로드</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2024 FastCampus LMS Crawler. Made with ❤️ using FastAPI</p>
        </footer>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast-container"></div>

    <script src="/static/script.js"></script>
</body>
</html>
